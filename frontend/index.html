<html lang="en">

    <link rel="icon" type="image/png" href="https://tiavhmbpplerffdjmodw.supabase.co/storage/v1/object/sign/APPMEDIA/STAY.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hYjVjYTJiZS0xMmVjLTQwNmYtOWZmNy03YmJmOGIzMTc5YWEiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJBUFBNRURJQS9TVEFZLnBuZyIsImlhdCI6MTc3MzgyNDg1OSwiZXhwIjoxOTMxNTA0ODU5fQ.DRm3ClsU3QcR4ejuNhG1f0BjvSQjNfhRIFQGu1axH4w" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>StayHardy</title>
    <!-- Preconnect for performance and avoiding ORB issues -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Material Symbols, Inter, Syne + DM Sans (Lifetime paywall) -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400..600&family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@500..800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0&display=swap" rel="stylesheet" />
    
    <script>
      (function () {
        var path = window.location.pathname;
        var hash = window.location.hash;
        if (!hash || hash.length <= 1) return;
        var hashContent = hash.substring(1);
        if (hashContent.charAt(0) !== '/') {
          // Rewrite to HashRouter-compatible format:
          // /auth/reset#error=... → /#/auth/reset?error=...
          window.location.replace('/#' + path + '?' + hashContent);
        }
      })();
    </script>
    
    <style>
      :root {
        --primary: #10b981;
        --primary-hover: #059669;
        --primary-glow: rgba(16, 185, 129, 0.4);
        --background-dark: #020617;
        --text-secondary: #94a3b8;
      }
      /* Ensure icons always render as symbols */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
      }

      /* FIX: PREVENT BLACK FLASH */
      html, body, #root {
        background-color: #000000 !important;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
    </style>
  </head>
