<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050807" />
    <title>Email verified — StayHardy</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #050807;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
        width: 100%;
      }
      .glow {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 232, 122, 0.12) 0%, transparent 70%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .check-svg {
        display: block;
        width: 80px;
        height: 80px;
      }
      .check-path {
        fill: none;
        stroke: #00e87a;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: check-draw 0.8s ease forwards;
      }
      @keyframes check-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      h1 {
        margin: 24px 0 0;
        font-size: 28px;
        font-weight: 700;
        text-align: center;
        line-height: 1.2;
      }
      .sub {
        margin: 12px 0 0;
        max-width: 300px;
        font-size: 14px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 280px;
        height: 52px;
        margin-top: 32px;
        padding: 0 16px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #00e87a, #00c563);
        color: #000;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        text-align: center;
        line-height: 1.25;
      }
      .btn:active {
        opacity: 0.92;
        transform: scale(0.99);
      }
      .note {
        margin: 12px 0 0;
        max-width: 280px;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.3);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="glow" aria-hidden="true">
        <svg class="check-svg" viewBox="0 0 100 100" aria-hidden="true">
          <path
            class="check-path"
            pathLength="100"
            d="M22 52 L42 72 L78 28"
          />
        </svg>
      </div>
      <h1>Email Verified! ✅</h1>
      <p class="sub">
        Your StayHardy account is now active. Open the app and log in to start building your discipline. 💪
      </p>
      <a class="btn" href="stayhardy://login">Open StayHardy App</a>
      <p class="note">Account activated · Safe to close this page</p>
    </div>
  </body>
</html>
